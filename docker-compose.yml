
version: "3.9"
services:
  app:
    build: .
    image: gphotos-backup-advanced:latest
    ports:
      - "5572:5572"
      - "5573:5573"
    volumes:
      - /volume1/docker/rclone/config:/config
      - /volume3/photo:/data
    environment:
      - TZ=Asia/Ho_Chi_Minh
    restart: unless-stopped
